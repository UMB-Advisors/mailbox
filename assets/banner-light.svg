<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F6F8FA"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <linearGradient id="wave1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7C3AED;stop-opacity:0.5"/>
      <stop offset="70%" style="stop-color:#3B82F6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Wave layer 1 (back) -->
  <path d="M0 160 Q100 120 200 140 T400 130 T600 150 T800 125 L800 200 L0 200 Z" fill="url(#wave1Grad)"/>

  <!-- Wave layer 2 (mid) -->
  <path d="M0 170 Q150 145 300 165 T500 150 T700 170 T800 155 L800 200 L0 200 Z" fill="url(#wave2Grad)"/>

  <!-- Diagonal divider accent -->
  <polygon points="600,0 800,0 800,60" fill="#7C3AED" opacity="0.03"/>
  <polygon points="0,200 0,150 180,200" fill="#3B82F6" opacity="0.03"/>

  <!-- Accent line -->
  <rect x="200" y="128" width="400" height="1.5" rx="1" fill="url(#accentLine)"/>

  <!-- Project name -->
  <text x="400" y="75" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#1F2328" letter-spacing="-0.5">MailBox One</text>

  <!-- Tagline -->
  <text x="400" y="112" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#656D76">Email Agent Appliance for Entrepreneurs, Business Owners, and anyone who Emails</text>
</svg>
