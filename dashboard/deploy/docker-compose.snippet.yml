# Add this service to /home/bob/mailbox/docker-compose.yml under the `services:`
# block, alongside postgres, ollama, n8n, qdrant, caddy.
#
# Assumes the existing compose already exports POSTGRES_USER / POSTGRES_PASSWORD
# / POSTGRES_DB (per /home/bob/mailbox/.env), and that postgres + n8n share the
# default network. No new volumes; the dashboard is stateless.

  mailbox-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mailbox-dashboard
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/mailbox-send
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/dashboard/queue"]
      interval: 30s
      timeout: 10s
      retries: 3
