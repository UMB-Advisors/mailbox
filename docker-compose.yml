services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:v1.17.1
    environment:
      MALLOC_CONF: narenas:1
    volumes:
    - qdrant_data:/qdrant/storage
    healthcheck:
      test:
      - CMD
      - bash
      - -c
      - echo > /dev/tcp/localhost/6333
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    runtime: nvidia
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
    - ollama_models:/root/.ollama
    healthcheck:
      test:
      - CMD-SHELL
      - bash -c 'cat < /dev/null > /dev/tcp/localhost/11434' 2>/dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  n8n:
    image: n8nio/n8n:2.14.2
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: mailbox.heronlabsinc.com
      WEBHOOK_URL: https://mailbox.heronlabsinc.com/
      N8N_EDITOR_BASE_URL: https://mailbox.heronlabsinc.com/
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_SECURE_COOKIE: 'true'
    volumes:
    - n8n_data:/home/node/.n8n
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:5678/healthz || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  caddy:
    build: ./caddy
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    depends_on:
      n8n:
        condition: service_healthy
    restart: unless-stopped
  mailbox-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mailbox-dashboard
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/mailbox-send
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/dashboard/queue"]
      interval: 30s
      timeout: 10s
      retries: 3
  mailbox-migrate:
    profiles: ["migrate"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
    command: sh -c "npm install --no-audit --no-fund && npm run migrate"
volumes:
  postgres_data: null
  qdrant_data: null
  ollama_models: null
  n8n_data: null
  caddy_data: null
  caddy_config: null
